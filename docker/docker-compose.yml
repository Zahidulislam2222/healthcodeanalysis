version: "3.8"

services:
  db:
    image: mysql:8.0
    container_name: hc-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: wordpress
      MYSQL_USER: wordpress
      MYSQL_PASSWORD: wordpress
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password

  wordpress:
    image: wordpress:6.7-php8.2-apache
    container_name: hc-wordpress
    restart: unless-stopped
    depends_on:
      - db
    ports:
      - "8889:80"
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_NAME: wordpress
      WORDPRESS_DB_USER: wordpress
      WORDPRESS_DB_PASSWORD: wordpress
      WORDPRESS_TABLE_PREFIX: wpv2_
      WORDPRESS_DEBUG: "1"
    volumes:
      - wp_data:/var/www/html
      - ../scripts/healthcode-api-bridge.php:/var/www/html/wp-content/plugins/healthcode-api-bridge.php

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: hc-phpmyadmin
    restart: unless-stopped
    depends_on:
      - db
    ports:
      - "8082:80"
    environment:
      PMA_HOST: db
      PMA_USER: root
      PMA_PASSWORD: rootpass

volumes:
  db_data:
  wp_data:
