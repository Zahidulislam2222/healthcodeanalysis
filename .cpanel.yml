---
deployment:
  tasks:
    # API Bridge plugin
    - export PLUGINDIR=/home/mehzsolu/public_html/wp-content/plugins/healthcode-api-bridge
    - /bin/mkdir -p $PLUGINDIR
    - /bin/cp scripts/healthcode-api-bridge.php $PLUGINDIR/healthcode-api-bridge.php
    # Design System plugin (dark theme + GSAP animations)
    - export DESIGNDIR=/home/mehzsolu/public_html/wp-content/plugins/healthcode-design-system
    - /bin/mkdir -p $DESIGNDIR/css
    - /bin/mkdir -p $DESIGNDIR/js
    - /bin/cp scripts/healthcode-design-system/healthcode-design-system.php $DESIGNDIR/healthcode-design-system.php
    - /bin/cp scripts/healthcode-design-system/css/healthcode-theme.css $DESIGNDIR/css/healthcode-theme.css
    - /bin/cp scripts/healthcode-design-system/js/healthcode-animations.js $DESIGNDIR/js/healthcode-animations.js
