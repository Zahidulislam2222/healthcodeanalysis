name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint & Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Ruff
        run: pip install ruff

      - name: Ruff lint
        run: ruff check scripts/ tests/

      - name: Ruff format check
        run: ruff format --check scripts/ tests/

      - name: Security scan (Bandit rules)
        run: ruff check --select S scripts/

      - name: PHP syntax check
        run: |
          php -l scripts/healthcode-api-bridge.php
          php -l scripts/healthcode-design-system/healthcode-design-system.php

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Phase 1 tests (75)
        run: python tests/test_phase1.py

      - name: Phase 2-4 tests (46)
        run: python tests/test_phase2_4.py

      - name: Phase 6 tests (38)
        run: python tests/test_phase6.py

      - name: End-to-end swap tests (126)
        run: python tests/test_e2e_swap.py

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt coverage

      - name: Run tests with coverage
        run: |
          coverage run tests/test_phase1.py
          coverage run -a tests/test_phase2_4.py
          coverage run -a tests/test_phase6.py
          coverage run -a tests/test_e2e_swap.py

      - name: Coverage report
        run: coverage report

      - name: Generate coverage badge data
        run: |
          COVERAGE=$(coverage report --format=total)
          echo "Coverage: ${COVERAGE}%"

  validate:
    name: Validate Configs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Validate customer template
        run: python scripts/config_validator.py configs/customer-template.json

      - name: Validate JSON syntax
        run: python -c "import json, glob; [json.load(open(f)) for f in glob.glob('configs/*.json')]"

  deploy-plugin:
    name: Deploy Plugin to Live Site
    needs: [lint, test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install requests
        run: pip install requests

      - name: Deploy plugin files via cPanel API
        env:
          CPANEL_URL: ${{ secrets.CPANEL_URL }}
          CPANEL_USERNAME: ${{ secrets.CPANEL_USERNAME }}
          CPANEL_API_TOKEN: ${{ secrets.CPANEL_API_TOKEN }}
          HC_API_KEY: ${{ secrets.HC_API_KEY }}
        run: |
          python -c "
          import requests, os

          cpanel_url = os.environ['CPANEL_URL']
          username = os.environ['CPANEL_USERNAME']
          token = os.environ['CPANEL_API_TOKEN']
          headers = {'Authorization': f'cpanel {username}:{token}'}
          wp = f'/home/{username}/public_html/wp-content'

          files = [
              ('healthcode-api-bridge.php', f'{wp}/plugins', 'scripts/healthcode-api-bridge.php'),
              ('healthcode-design-system.php', f'{wp}/plugins/healthcode-design-system', 'scripts/healthcode-design-system/healthcode-design-system.php'),
              ('healthcode-theme.css', f'{wp}/plugins/healthcode-design-system/css', 'scripts/healthcode-design-system/css/healthcode-theme.css'),
              ('healthcode-animations.js', f'{wp}/plugins/healthcode-design-system/js', 'scripts/healthcode-design-system/js/healthcode-animations.js'),
              ('hc-auto-activate.php', f'{wp}/mu-plugins', 'scripts/hc-auto-activate.php'),
          ]

          for filename, remote_dir, local_path in files:
              with open(local_path, 'r', encoding='utf-8') as f:
                  content = f.read()
              resp = requests.post(
                  f'{cpanel_url}/execute/Fileman/save_file_content',
                  headers=headers,
                  data={'dir': remote_dir, 'file': filename, 'content': content},
                  timeout=30
              )
              result = resp.json()
              status = result.get('status', 0)
              if status != 1:
                  print(f'FAILED: {filename} - {result.get(\"errors\")}')
                  exit(1)
              print(f'Deployed: {filename}')

          print('All plugin files deployed successfully')
          "

      - name: Flush cache
        env:
          HC_API_KEY: ${{ secrets.HC_API_KEY }}
          WP_SITE_URL: ${{ secrets.WP_SITE_URL }}
        run: |
          python -c "
          import requests, os
          site_url = os.environ['WP_SITE_URL'].rstrip('/')
          resp = requests.post(
              f'{site_url}/wp-json/healthcode/v1/flush-elementor-cache',
              headers={'X-HC-API-Key': os.environ['HC_API_KEY']},
              timeout=30
          )
          print('Cache flush:', resp.json())
          "
